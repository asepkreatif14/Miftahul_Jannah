<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Data Santri - Miftahul Jannah</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        
        .timbul {
            transition: all 0.3s ease;
            box-shadow: 6px 6px 0px rgba(21, 128, 61, 0.2);
            border: 2px solid #15803d;
        }
        
        .kartu-nama:hover {
            transform: translateY(-2px);
            background-color: #f0fdf4;
        }

        .spinner {
            animation: rotate 2s linear infinite;
        }
        @keyframes rotate {
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-900">

<!-- Navigasi -->
<nav class="bg-green-700 text-white sticky top-0 z-50 shadow-lg border-b-4 border-yellow-500">
    <div class="max-w-4xl mx-auto px-4 py-3 flex justify-between items-center">
        <div class="flex items-center space-x-2">
            <i class="fas fa-star-and-crescent text-yellow-400"></i>
            <span class="font-black text-sm uppercase tracking-tighter">Miftahul Jannah</span>
        </div>
        <a href="index.html" class="bg-white/20 hover:bg-yellow-500 px-4 py-1 rounded-full text-[10px] font-bold transition uppercase">Beranda</a>
    </div>
</nav>

<!-- Header Info -->
<header class="bg-green-900 text-white py-12 px-4 text-center relative overflow-hidden">
    <div class="relative z-10">
        <h2 class="text-2xl md:text-4xl font-black uppercase tracking-tight italic">Data Santri - Miftahul Jannah</h2>
        <div class="mt-3 inline-flex items-center bg-yellow-500 text-green-900 px-4 py-1.5 rounded-full text-[10px] font-black uppercase tracking-widest shadow-lg">
            <i class="fas fa-users mr-2"></i> <span id="count-badge">Menghubungkan...</span>
        </div>
    </div>
</header>

<main class="max-w-2xl mx-auto px-4 py-8">
    <!-- Kotak Pencarian -->
    <div class="relative mb-8">
        <input type="text" id="cariInput" placeholder="Cari nama santri..." 
               class="w-full p-4 pl-12 rounded-2xl border-2 border-green-800/10 outline-none focus:border-green-600 shadow-sm font-bold placeholder:text-slate-300 transition-all">
        <i class="fas fa-search absolute left-4 top-5 text-green-600 opacity-50"></i>
    </div>

    <!-- Container List -->
    <div id="list-santri" class="bg-white rounded-[2rem] p-4 timbul space-y-1 min-h-[200px]">
        <div class="py-20 text-center">
            <i class="fas fa-circle-notch spinner text-green-600 text-3xl mb-3"></i>
            <p class="text-slate-400 text-[10px] font-bold uppercase tracking-[0.2em]">Sinkronisasi Database...</p>
        </div>
    </div>
</main>

<footer class="py-12 text-center opacity-50">
    <p class="text-slate-500 text-[10px] font-bold uppercase tracking-[0.3em]">© 2020 Pesantren Miftahul Jannah</p>
</footer>

<script>
    /** * PENTING: Ganti URL di bawah dengan link CSV dari Google Sheets Anda (Sheet3).
     * Pastikan sudah di-publish ke web sebagai CSV.
     */
    const URL_CSV = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSJd0463xuTbRjLYMrAE9bJksGcOqNCbY6LRRrb-QMQFck21M-A_56jl8nbm493qF4mORgDLjP21wZd/pub?gid=1323654406&single=true&output=csv';

    let databaseSantri = [];

    async function muatData() {
        try {
            const response = await fetch(URL_CSV);
            const teks = await response.text();
            
            // Membagi baris CSV dan menghapus header
            const baris = teks.split(/\r?\n/).slice(1); 

            databaseSantri = baris.map(item => {
                // Regex untuk menangani koma di dalam tanda kutip
                const kolom = item.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                
                // Berdasarkan gambar yang Anda kirim:
                // Kolom B (index 1) = Nama Lengkap
                // Kolom F (index 5) = Tempat Lahir
                return {
                    nama: kolom[1] ? kolom[1].replace(/"/g, '').trim() : '',
                    asal: kolom[5] ? kolom[5].replace(/"/g, '').trim() : 'Cilacap'
                };
            }).filter(s => s.nama !== "" && s.nama.toLowerCase() !== "nama lengkap");

            document.getElementById('count-badge').innerText = `${databaseSantri.length} Santri Terdaftar`;
            tampilkanData(databaseSantri);

        } catch (error) {
            console.error("Error fetching data:", error);
            document.getElementById('list-santri').innerHTML = `
                <div class="text-center py-16 text-red-500">
                    <i class="fas fa-exclamation-triangle text-4xl mb-3"></i>
                    <p class="font-black uppercase text-sm tracking-tighter">Koneksi Terputus</p>
                    <p class="text-[10px] opacity-70 mt-1 font-bold">Periksa link Google Sheets atau Publish settings Anda.</p>
                </div>
            `;
        }
    }

    function tampilkanData(data) {
        const container = document.getElementById('list-santri');
        
        if (data.length === 0) {
            container.innerHTML = `
                <div class="py-16 text-center">
                    <i class="fas fa-user-slash text-slate-200 text-4xl mb-3"></i>
                    <p class="text-slate-400 text-[10px] font-bold uppercase tracking-widest italic">Data tidak ditemukan</p>
                </div>
            `;
            return;
        }

        container.innerHTML = data.map((s, i) => `
            <div class="kartu-nama flex items-center p-4 border-b border-slate-50 last:border-none transition rounded-2xl group">
                <div class="w-9 h-9 flex-shrink-0 bg-green-50 text-green-700 rounded-xl flex items-center justify-center font-black text-xs mr-4 group-hover:bg-green-700 group-hover:text-white transition-colors">
                    ${i + 1}
                </div>
                <div class="overflow-hidden flex-grow">
                    <h4 class="font-bold text-slate-800 uppercase text-xs truncate tracking-tight group-hover:text-green-800 transition-colors">${s.nama}</h4>
                    <p class="text-[9px] text-slate-400 font-bold uppercase tracking-widest mt-0.5">
                        <i class="fas fa-map-marker-alt text-yellow-500 mr-1 opacity-70"></i> ${s.asal}
                    </p>
                </div>
                <div class="text-slate-200 group-hover:text-green-200">
                    <i class="fas fa-chevron-right text-[10px]"></i>
                </div>
            </div>
        `).join('');
    }

    // Fitur Pencarian Real-time
    document.getElementById('cariInput').addEventListener('input', (e) => {
        const kataKunci = e.target.value.toLowerCase();
        const hasil = databaseSantri.filter(s => s.nama.toLowerCase().includes(kataKunci));
        tampilkanData(hasil);
    });

    window.onload = muatData;
</script>

</body>
</html>
